name: Build Flutter AAB - Final

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"
      JAVA_TOOL_OPTIONS: "-Xmx3g"

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.6'
          channel: stable
          cache: true

      - name: Write local.properties
        run: |
          mkdir -p android
          FLUTTER_SDK=$(dirname "$(dirname "$(which flutter)")")
          echo "flutter.sdk=$FLUTTER_SDK" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses

      - name: Precache Flutter engine
        run: flutter precache --android --force

      - name: flutter pub get
        run: flutter pub get

      - name: Verify keystore
        run: |
          set -e
          echo "Using keystore from repo: android/app/upload-keystore.jks"
          ls -l android/app/upload-keystore.jks
          echo "Getting SHA-1 fingerprint:"
          keytool -list -v -keystore android/app/upload-keystore.jks -alias skeletalpt -storepass skeletalpt123 -keypass skeletalpt123 | grep "SHA1:"
          echo "KEY_ALIAS=skeletalpt" >> $GITHUB_ENV
          echo "STORE_PASSWORD=skeletalpt123" >> $GITHUB_ENV
          echo "KEY_PASSWORD=skeletalpt123" >> $GITHUB_ENV

      - name: Build signed AAB
        run: |
          flutter build appbundle --release --build-number $GITHUB_RUN_NUMBER --no-tree-shake-icons

      - name: Upload artifact (primary path)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: warn

      - name: Upload artifact (fallback path)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab-fallback
          path: build/app/outputs/bundle/*/app-*.aab
          if-no-files-found: ignore
